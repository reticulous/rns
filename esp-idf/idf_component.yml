description: "reticulous-core: Reticulum (RNS) protocol core for spangap device apps. Pure protocol logic — transports plug in via the RNSD_PORT_TRANSPORT ITS surface. Vendors the µReticulum hard fork + bzip2 as nested sub-components."
url: https://github.com/reticulous/reticulous-core
version: "0.1.0"
license: "Apache-2.0"
targets:
  - esp32s3
dependencies:
  idf:
    version: ">=5.5"
  # Cross-straddle deps (spangap-core) are declared in straddle.yaml's
  # `requires:`, not here — they're satisfied at the consumer's build time
  # by `spangap make`'s staging step (staging/components/<short>/ picked
  # up via EXTRA_COMPONENT_DIRS), so CMakeLists.txt's `REQUIRES` lines
  # can use short, fork-friendly names.
