# rns — Reticulum (RNS) protocol core for spangap.
#
# Pure protocol logic: identity, destinations, path table, transport
# state machine, links, resources. Zero networking/radio dependencies —
# transport straddles (iface-tcp/-auto/-espnow/-lora) plug their
# interfaces in via the RNSD_PORT_TRANSPORT ITS surface.
#
# Vendors the µReticulum hard fork (esp-idf/components/microreticulum/)
# and bzip2 1.0.8 (esp-idf/components/bzip2/) as nested sub-components.
# Consumers (hw-tdeck and any other buildable straddle) pick these
# up via the staging/components/*/components/ glob in their top-level
# CMakeLists.txt.
#
# Browser half holds shared RNS UI (RNS settings panel, Nodes window,
# Announces window, RNS Pinia state). LXMF/Nomad/maps are separate
# straddles that contribute their own panels.
schema_version: 1
name: reticulous/rns
prefix: rns
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
# spangap-core is implicit (the empty-prefix platform foundation) — not listed.

# Build settings this straddle's vendored µReticulum fork needs. They ride in
# via the sdkconfig fragment (layered above the platform defaults), so they
# only apply when rns is actually staged — no consumer board has to know them.
kconfig:
  # microReticulum uses C++ exceptions extensively — every error path in
  # Identity, Packet, Cryptography, Persistence raises std::invalid_argument /
  # std::runtime_error. The platform default disables exceptions for code size
  # (CONFIG_COMPILER_CXX_EXCEPTIONS=n); re-enable here. Cost ~30 KB + libstdc++
  # unwinder tables. EMG_POOL_SIZE=0 = no emergency throw pool.
  - CONFIG_COMPILER_CXX_EXCEPTIONS=y
  - CONFIG_COMPILER_CXX_EXCEPTIONS_EMG_POOL_SIZE=0
  # mbedTLS HKDF — used by µR's Cryptography/HKDF.cpp (key derivation for
  # Fernet, IFAC, Identity prove/verify). Off by default in IDF.
  - CONFIG_MBEDTLS_HKDF_C=y
# Auto-init: folded into the generated spangapInitStraddles() dispatcher. Runs
# in the straddle band, after the platform band (so storage/LCD are up). The
# transport straddles (tr-*) all `requires: reticulous/rns`, so the dependency-
# topo order brings rnsd up — and its ITS port surface with it — before they
# self-register their interfaces. No explicit ordering needed.
init:
  - call: rnsdInit

# Browser-side UI registration (parallel to init: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerRnsd
    module: modules/rnsd

# Declarative settings: LCD pane + storage defaults generated from this block.
# web: false — RnsdPanel.vue keeps owning the web leaf (its rows match, but the
# module also wires status nodes). path.max/path.ttl are deliberately defaultless
# (mR's path table is unbounded). LCD leaf label kept "General" to preserve the
# existing menu node; the non-setting rnsd defaults stay in rnsd.cpp.
settings:
  - menu:
      - { id: mesh, label: "Mesh Network", placement: 3 }
      - { id: general, label: "General", placement: 1 }
    web: false
    rows:
      - section: "Reticulum"
      - value:  { label: "Identity", key: "rnsd.identity_hash" }
      - switch: { label: "Enable", key: "s.rnsd.enable", default: 1 }
      - switch: { label: "Transport node", key: "s.rnsd.transport_enabled", default: 0 }
      - text:   { label: "Node name", key: "s.rnsd.name", default: "" }
      - slider: { label: "Announce (s)", key: "s.rnsd.announce.interval", min: 0, max: 21600, default: 1800 }
      - section: "Path Table"
      - slider: { label: "Capacity", key: "s.rnsd.path.max", min: 64, max: 512 }
      - slider: { label: "TTL (s)", key: "s.rnsd.path.ttl", min: 3600, max: 604800 }
